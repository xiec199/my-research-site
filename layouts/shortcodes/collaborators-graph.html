<!-- Collaborators Force-Directed Graph Shortcode -->
<div id="collab-graph-container" style="width:100%; max-width:900px; margin:0 auto;">
  <div id="collab-legend" style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;font-size:13px;">
    <span><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:#e63946;vertical-align:middle;margin-right:4px;"></span>You</span>
    <span><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:#457b9d;vertical-align:middle;margin-right:4px;"></span>Domestic Collaborators</span>
    <span><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:#2a9d8f;vertical-align:middle;margin-right:4px;"></span>International Collaborators</span>
    <span><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:#e9c46a;vertical-align:middle;margin-right:4px;"></span>Students</span>
  </div>
  <svg id="collab-graph" style="width:100%;height:520px;border:1px solid #e0e0e0;border-radius:8px;"></svg>
  <div id="collab-tooltip" style="
    position:fixed;
    display:none;
    background:rgba(30,30,30,0.92);
    color:#fff;
    padding:10px 14px;
    border-radius:8px;
    font-size:13px;
    pointer-events:none;
    max-width:220px;
    z-index:9999;
    line-height:1.6;
  "></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(function() {
  const DATA_URL = '/data/collaborators.json';

  const colorMap = {
    self:          '#e63946',
    domestic:      '#457b9d',
    international: '#2a9d8f',
    student:       '#e9c46a'
  };

  function radiusOf(d) {
    if (d.group === 'self') return 22;
    if (d.group === 'student') return 12;
    return 16;
  }

  fetch(DATA_URL)
    .then(r => r.json())
    .then(data => drawGraph(data))
    .catch(err => console.error('Failed to load collaborators data:', err));

  function drawGraph(data) {
    const container = document.getElementById('collab-graph');
    const W = container.clientWidth || 860;
    const H = 520;

    const svg = d3.select('#collab-graph')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    // Arrow marker
    svg.append('defs').append('marker')
      .attr('id', 'arrow')
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 28).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-5L10,0L0,5')
      .attr('fill', '#aaa');

    const simulation = d3.forceSimulation(data.nodes)
      .force('link', d3.forceLink(data.links)
        .id(d => d.id)
        .distance(d => 120 + (d.papers || 1) * 5))
      .force('charge', d3.forceManyBody().strength(-320))
      .force('center', d3.forceCenter(W / 2, H / 2))
      .force('collision', d3.forceCollide().radius(d => radiusOf(d) + 12));

    // Links
    const link = svg.append('g')
      .selectAll('line')
      .data(data.links)
      .join('line')
      .attr('stroke', '#ccc')
      .attr('stroke-opacity', 0.7)
      .attr('stroke-width', d => Math.max(1, Math.sqrt(d.papers || 1) * 1.4));

    // Node groups
    const node = svg.append('g')
      .selectAll('g')
      .data(data.nodes)
      .join('g')
      .attr('cursor', d => d.url ? 'pointer' : 'grab')
      .call(drag(simulation))
      .on('click', (event, d) => { if (d.url) window.open(d.url, '_blank'); });

    // Circles
    node.append('circle')
      .attr('r', d => radiusOf(d))
      .attr('fill', d => colorMap[d.group] || '#888')
      .attr('stroke', '#fff')
      .attr('stroke-width', 2.5)
      .attr('opacity', 0.92);

    // Labels
    node.append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', d => radiusOf(d) + 14)
      .attr('font-size', '11px')
      .attr('fill', 'currentColor')
      .text(d => d.name);

    // Tooltip
    const tooltip = document.getElementById('collab-tooltip');

    node
      .on('mouseover', (event, d) => {
        tooltip.style.display = 'block';
        tooltip.innerHTML = `
          <strong>${d.name}</strong>${d.nameCN ? ' (' + d.nameCN + ')' : ''}<br/>
          ${d.affiliation}${d.affiliationCN ? '<br/><span style="opacity:.75">' + d.affiliationCN + '</span>' : ''}
          ${d.papers ? '<br/>Papers: ' + d.papers : ''}
          ${d.url ? '<br/><span style="color:#7ec8e3;font-size:11px;">Click to visit page ↗</span>' : ''}
        `;
      })
      .on('mousemove', (event) => {
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top  = (event.clientY - 10) + 'px';
      })
      .on('mouseout', () => { tooltip.style.display = 'none'; });

    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
  }

  function drag(simulation) {
    return d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      });
  }
})();
</script>
