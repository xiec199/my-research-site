bio: |
  CHAO XIE is a researcher working at the intersection of computational psychiatry, 
  cognitive neuroscience, and intelligent computing. His research focuses on understanding 
  the neural and computational mechanisms underlying mental health and complex human behavior.
  Using cutting-edge neuroimaging techniques (MRI/fMRI) combined with computational modeling 
  and machine learning, he investigates how the brain supports cognition and how disruptions 
  in these systems give rise to psychiatric disorders.

